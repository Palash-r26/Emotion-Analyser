<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Emotion Detection Result</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #e0f7fa;
      color: #111;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: row;
      height: 100vh;
      overflow: hidden;
      transition: background-color 1s ease;
    }

    .video-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-right: 2px solid #ccc;
      padding: 20px;
      position: relative;
    }

    .video-container video {
      border-radius: 15px;
      box-shadow: 0 0 20px #000;
      background: #000;
      object-fit: cover;
    }

    .refresh-button {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      padding: 15px 25px;
      font-size: 21px;
      background-color: rgb(0, 123, 255);
      color: white;
      border: none;
      border-radius: 17px;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      transition: transform 0.2s ease, background-color 0.3s;
    }

    .refresh-button:active {
      transform: translateX(-50%) scale(0.95);
      background-color: rgb(0, 90, 200);
    }

    .suggestions-container {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
    }

    .suggestions-container h2 {
      color:rgb(0, 0, 0);
      margin-bottom: 20px;
    }

    .emotion-text {
      color:rgb(114, 13, 49);
    }

    .song-cards {
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 20px;
    }

    .song-cards div {
      background: #fff;
      border-radius: 10px;
      padding: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }

    .song-cards div:hover {
      transform: scale(1.03);
    }

    .song-cards p {
      margin: 8px 0 0;
      text-align: center;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="video-container">
    <video id="webcam" width="640" height="480" autoplay playsinline muted></video>
    <canvas id="snapshot-canvas" width="640" height="480" style="display:none;"></canvas>
    <button onclick="refreshPage()" class="refresh-button">Refresh</button>
  </div>

  <div class="suggestions-container">
    <h2>Detected Emotion: <span class="emotion-text">Detecting...</span></h2>
    <p id="debug-emotion">Current: </p>
    <p>Suggestions will appear here after emotion is stable for 7 seconds.</p>
    <div class="song-cards" id="song-cards"></div>
  </div>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
